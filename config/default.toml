[pipeline]
agents = ["curator", "solver", "critic", "organizer"]
iterations = 1

[pipeline.insight_finder]
enabled = true
frequency = 5  # Run every N iterations

[storage]
data_root = "~/.reflection"
# env defaults to test_${USER} when omitted (see agenix/config.py)
# Set explicitly to "prod" for production runs.
lance_dir = "lance"

[embedder]
model_name = "all-MiniLM-L6-v2"
top_k = 5

[services]
# Remote service endpoints are configured per-host.
# See config/hosts.yaml for endpoint definitions.

[services.kb_eval_server]
host = "0.0.0.0"
port = 8456
devices = ["cuda:0"]
max_critical_time = 120
max_timeout = 600
code_type = "triton"
compile_pytorch = false

[orchestrator]
shutdown_timeout = 30
status_interval = 60

[[orchestrator.agents]]
name = "curator"
count = 1
options = { n = 100, levels = "level_1,level_2" }

[[orchestrator.agents]]
name = "solver"
count = 2

[[orchestrator.agents]]
name = "critic"
count = 1

[[orchestrator.agents]]
name = "organizer"
count = 1
options = { interval = 300 }

[[orchestrator.agents]]
name = "insight_finder"
count = 1
options = { interval = 600 }
